<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shitabi Majlis Invitation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        padding: 0;
        background: url('shitabi-invite.jpeg') no-repeat top center;
        background-size: contain;
        background-color: #fff;
        background-attachment: scroll;
        font-family: "Segoe UI", sans-serif;
        color: #333;
        min-height: 100vh;
        position: relative;
    }

    /* Invisible clickable hotspots */
    .hotspot {
        position: absolute;
        width: 80%;
        left: 10%;
        height: 40px;
        cursor: pointer;
    }

    /* Adjust these positions to match your card layout */
    #dateSpot { top: 350px; }
    #timeSpot { top: 400px; }
    #hijriSpot { top: 450px; }
    #venueSpot { top: 520px; height: 80px; }
    #rsvpSpot { top: 640px; }

    /* Countdown + Hijri overlay box */
    .overlay {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(255, 255, 255, 0.75);
        padding: 12px 18px;
        border-radius: 10px;
        width: 85%;
        max-width: 360px;
        text-align: center;
    }
</style>
</head>

<body>

<!-- CLICKABLE HOTSPOTS -->
<a id="dateSpot" class="hotspot" href="#countdown"></a>

<a id="timeSpot" class="hotspot" href="#countdown"></a>

<a id="hijriSpot" class="hotspot" href="#hijri"></a>

<a id="venueSpot" class="hotspot" 
   href="https://maps.app.goo.gl/2NRmXtThpHPEpaSR6" 
   target="_blank"></a>

<a id="rsvpSpot" class="hotspot" href="https://wa.me/919324760035" target="_blank"></a>


<!-- LIVE INFO OVERLAY -->
<div class="overlay">
    <div id="countdown">Loading countdown…</div>
    <div id="hijri" style="margin-top:6px;">Fetching Hijri date…</div>
</div>


<script>
// ----------------------
// LIVE COUNTDOWN
// ----------------------
const eventDate = new Date("July 11, 2026 17:30:00").getTime();

setInterval(() => {
    const now = new Date().getTime();
    const diff = eventDate - now;

    if (diff <= 0) {
        document.getElementById("countdown").innerHTML = "The event has started";
        return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

    document.getElementById("countdown").innerHTML =
        `${days} days, ${hours} hours, ${minutes} minutes to go`;
}, 1000);


// ----------------------
// LIVE HIJRI DATE
// ----------------------
fetch("https://api.aladhan.com/v1/gToH")
    .then(res => res.json())
    .then(data => {
        const hijri = data.data.hijri;
        document.getElementById("hijri").innerHTML =
            `Today's Hijri Date: ${hijri.day} ${hijri.month.en} ${hijri.year}`;
    })
    .catch(() => {
        document.getElementById("hijri").innerHTML = "Hijri date unavailable";
    });
</script>

</body>
</html>
