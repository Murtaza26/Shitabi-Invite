<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shitabi Majlis Invitation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Auto-refresh / No cache -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<style>
    body {
        margin: 0;
        padding: 0;
        background: url('shitabi-invite.jpeg') no-repeat top center;
        background-size: contain;
        background-color: #fff;
        font-family: "Segoe UI", sans-serif;
        height: 100vh;
        position: relative;
        overflow-x: hidden;
    }

    /* Top countdown box */
    .top-overlay {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(255, 255, 255, 0.85);
        padding: 10px 16px;
        border-radius: 10px;
        width: 85%;
        max-width: 360px;
        text-align: center;
        font-size: 16px;
        z-index: 10;
    }

    /* Hotspots (absolute, based on 1484px height) */
    .hotspot {
        position: absolute;
        left: 10%;
        width: 80%;
        cursor: pointer;
    }

    /* Calculated hotspot positions (converted to percentages) */
    #dateSpot  { top: calc(1484px * 0.305); height: 40px; }
    #timeSpot  { top: calc(1484px * 0.355); height: 40px; }
    #hijriSpot { top: calc(1484px * 0.405); height: 40px; }
    #venueSpot { top: calc(1484px * 0.485); height: 120px; }
    #rsvpSpot  { top: calc(1484px * 0.615); height: 45px; }
</style>
</head>

<body>

<!-- COUNTDOWN AT TOP -->
<div class="top-overlay">
    <div id="countdown">Loading countdown…</div>
    <div id="hijri">Fetching Hijri date…</div>
</div>

<!-- CLICKABLE HOTSPOTS -->
<a id="dateSpot" class="hotspot" href="#countdown"></a>
<a id="timeSpot" class="hotspot" href="#countdown"></a>
<a id="hijriSpot" class="hotspot" href="#hijri"></a>

<a id="venueSpot" class="hotspot" 
   href="https://maps.app.goo.gl/2NRmXtThpHPEpaSR6" 
   target="_blank"></a>

<a id="rsvpSpot" class="hotspot" 
   href="https://wa.me/919324760035" 
   target="_blank"></a>


<script>
// ----------------------
// LIVE COUNTDOWN
// ----------------------
const eventDate = new Date("July 11, 2026 17:30:00").getTime();

setInterval(() => {
    const now = new Date().getTime();
    const diff = eventDate - now;

    if (diff <= 0) {
        document.getElementById("countdown").innerHTML = "The event has started";
        return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

    document.getElementById("countdown").innerHTML =
        `${days} days, ${hours} hours, ${minutes} minutes to go`;
}, 1000);

// LIVE HIJRI DATE
// ----------------------
