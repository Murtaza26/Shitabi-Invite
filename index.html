<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shitabi Majlis Invitation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Auto-refresh / No cache -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<style>
    body {
        margin: 0;
        padding: 0;
        background: #fff;
        font-family: "Segoe UI", sans-serif;
        overflow-x: hidden;
    }

    /* Top countdown box */
    .top-overlay {
        position: fixed;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(255, 255, 255, 0.9);
        padding: 10px 16px;
        border-radius: 10px;
        width: 85%;
        max-width: 360px;
        text-align: center;
        font-size: 16px;
        z-index: 20;
    }

    /* Card container */
    .card-container {
        position: relative;
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
    }

    .card-container img {
        width: 100%;
        height: auto;
        display: block;
    }

    /* Hotspots inside the image */
    .hotspot {
        position: absolute;
        left: 10%;
        width: 80%;
        cursor: pointer;
        z-index: 10;
    }

    /* Percentage positions based on 1484px height */
    #venueSpot { top: 48.5%; height: 12%; }
    #rsvpSpot  { top: 61.5%; height: 5%; }
</style>
</head>

<body>

<!-- COUNTDOWN AT TOP -->
<div class="top-overlay">
    <div id="countdown">Loading countdown…</div>
    <div id="hijri">Fetching Hijri date…</div>
</div>

<!-- CARD IMAGE + HOTSPOTS -->
<div class="card-container">
    <img src="shitabi-invite.jpeg" alt="Invitation Card">

    <!-- CLICKABLE HOTSPOTS -->
    <a id="venueSpot" class="hotspot"
       href="https://maps.app.goo.gl/2NRmXtThpHPEpaSR6"
       target="_blank"></a>

    <a id="rsvpSpot" class="hotspot"
       href="https://wa.me/919324760035"
       target="_blank"></a>
</div>

<script>
// ----------------------
// LIVE COUNTDOWN
// ----------------------
const eventDate = new Date("July 11, 2026 17:30:00").getTime();

setInterval(() => {
    const now = new Date().getTime();
    const diff = eventDate - now;

    if (diff <= 0) {
        document.getElementById("countdown").innerHTML = "The event has started";
        return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

    document.getElementById("countdown").innerHTML =
        `${days} days, ${hours} hours, ${minutes} minutes to go`;
}, 1000);


// ----------------------
// LIVE HIJRI DATE
// ----------------------
fetch("https://api.aladhan.com/v1/gToH")
    .then(res => res.json())
    .then(data => {
        const hijri = data.data.hijri;
        document.getElementById("hijri").innerHTML =
            `Today's Hijri Date: ${hijri.day} ${hijri.month.en} ${hijri.year}`;
    })
    .catch(() => {
        document.getElementById("hijri").innerHTML = "Hijri date unavailable";
    });
</script>

</body>
</html>
